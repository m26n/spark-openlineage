services:
  postgres-source:
    image: postgres:16
    container_name: spark-openlineage-postgres-source
    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: customers
      POSTGRES_PASSWORD: customers
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customers -d customerdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/source/init:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: spark-openlineage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: spark-openlineage-minio-bootstrap
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done
        mc mb --ignore-existing local/customer-lake

  marquez-db:
    image: postgres:14
    container_name: spark-openlineage-marquez-db
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      MARQUEZ_DB: marquez
      MARQUEZ_USER: marquez
      MARQUEZ_PASSWORD: marquez
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5433:5432"
    volumes:
      - ./docker/marquez/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/marquez/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - marquez-db-data:/var/lib/postgresql/data

  marquez-api:
    image: marquezproject/marquez:0.50.0
    platform: linux/amd64
    container_name: spark-openlineage-marquez-api
    depends_on:
      marquez-db:
        condition: service_healthy
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
      SEARCH_ENABLED: "false"
    ports:
      - "5005:5000"
      - "5006:5001"

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    platform: linux/amd64
    container_name: spark-openlineage-marquez-web
    depends_on:
      marquez-api:
        condition: service_started
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000
      REACT_APP_ADVANCED_SEARCH: "false"
    ports:
      - "3000:3000"

  spark:
    image: apache/spark:3.5.8-scala2.12-java17-python3-r-ubuntu
    container_name: spark-openlineage-spark
    depends_on:
      postgres-source:
        condition: service_healthy
      minio:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
      marquez-api:
        condition: service_started
    environment:
      HOME: /tmp/spark-home
      SPARK_LOCAL_DIRS: /tmp/spark-local
    volumes:
      - ./:/workspace
    working_dir: /workspace

volumes:
  marquez-db-data:
