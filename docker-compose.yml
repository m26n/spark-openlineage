services:
  postgres-source:
    image: postgres:16
    container_name: spark-openlineage-postgres-source
    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: customers
      POSTGRES_PASSWORD: customers
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customers -d customerdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/source/init:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: spark-openlineage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: spark-openlineage-minio-bootstrap
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done
        mc mb --ignore-existing local/customer-lake

  broker:
    image: confluentinc/cp-kafka:8.0.0
    container_name: spark-openlineage-datahub-broker
    command:
      - /bin/bash
      - -c
      - |
        file_path="/var/lib/kafka/data/clusterID"

        if [ ! -f "$$file_path" ]; then
          /bin/kafka-storage random-uuid > "$$file_path"
          kafka-storage format --ignore-formatted -t "$$(cat "$$file_path")" -c /etc/kafka/kafka.properties
        fi

        export CLUSTER_ID="$$(cat "$$file_path")"
        /etc/confluent/docker/run
    environment:
      KAFKA_ADVERTISED_LISTENERS: BROKER://broker:29092
      KAFKA_BROKER_ID: "1"
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:39092
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_HEAP_OPTS: -Xms512m -Xmx512m
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT
      KAFKA_LISTENERS: BROKER://broker:29092,CONTROLLER://broker:39092
      KAFKA_LOG4J_LOGGERS: org.apache.kafka.image.loader.MetadataLoader=WARN
      KAFKA_MAX_MESSAGE_BYTES: "5242880"
      KAFKA_MESSAGE_MAX_BYTES: "5242880"
      KAFKA_NODE_ID: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_PROCESS_ROLES: controller,broker
    healthcheck:
      test: ["CMD-SHELL", "nc -z broker 29092"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s
    volumes:
      - datahub-broker-data:/var/lib/kafka/data

  mysql:
    image: mysql:8.2
    container_name: spark-openlineage-datahub-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_DATABASE: datahub
      MYSQL_PASSWORD: datahub
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: datahub
      MYSQL_USER: datahub
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h mysql -u $$MYSQL_USER --password=$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
    volumes:
      - datahub-mysql-data:/var/lib/mysql

  mysql-setup:
    image: acryldata/datahub-mysql-setup:v1.4.0.3
    container_name: spark-openlineage-datahub-mysql-setup
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      CDC_MCL_PROCESSING_ENABLED: "false"
      CDC_PASSWORD: datahub_cdc
      CDC_USER: datahub_cdc
      DATAHUB_DB_NAME: datahub
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: datahub
      MYSQL_PORT: "3306"
      MYSQL_ROOT_PASSWORD: datahub
      MYSQL_USERNAME: datahub

  search:
    image: opensearchproject/opensearch:2.19.3
    container_name: spark-openlineage-datahub-search
    environment:
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms768m -Xmx1024m -Dlog4j2.formatMsgNoLookups=true
      discovery.type: single-node
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --fail http://search:9200/_cluster/health?wait_for_status=yellow&timeout=0s"]
      interval: 10s
      timeout: 15s
      retries: 20
      start_period: 60s
    volumes:
      - datahub-search-data:/usr/share/opensearch/data

  opensearch-setup:
    image: acryldata/datahub-elasticsearch-setup:v1.4.0.3
    container_name: spark-openlineage-datahub-opensearch-setup
    command:
      - /bin/sh
      - -c
      - /create-indices.sh
    depends_on:
      search:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: search
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_PROTOCOL: http
      ELASTICSEARCH_USE_SSL: "false"
      USE_AWS_ELASTICSEARCH: "true"

  system-update-quickstart:
    image: acryldata/datahub-upgrade:v1.4.0.3
    container_name: spark-openlineage-datahub-system-update
    command:
      - -u
      - SystemUpdate
    depends_on:
      broker:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mysql-setup:
        condition: service_completed_successfully
      search:
        condition: service_healthy
      opensearch-setup:
        condition: service_completed_successfully
    environment:
      BACKFILL_BROWSE_PATHS_V2: "true"
      CREATE_USER: "false"
      CREATE_USER_PASSWORD: datahub
      CREATE_USER_USERNAME: datahub
      DATAHUB_BASE_PATH: /
      DATAHUB_GMS_BASE_PATH: /
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_PRECREATE_TOPICS: "true"
      DATAHUB_SQL_SETUP_ENABLED: "true"
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      EBEAN_DATASOURCE_HOST: mysql:3306
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_URL: jdbc:mysql://mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8&enabledTLSProtocols=TLSv1.2
      EBEAN_DATASOURCE_USERNAME: root
      ELASTICSEARCH_BUILD_INDICES_CLONE_INDICES: "false"
      ELASTICSEARCH_HOST: search
      ELASTICSEARCH_IMPLEMENTATION: opensearch
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_REFRESH_INTERVAL_SECONDS: "3"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_PROTOCOL: http
      ELASTICSEARCH_USE_SSL: "false"
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      ENTITY_VERSIONING_ENABLED: "true"
      GRAPH_SERVICE_IMPL: elasticsearch
      KAFKA_BOOTSTRAP_SERVER: broker:29092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-gms:8080/schema-registry/api/
      NEO4J_HOST: http://neo4j:7474
      NEO4J_PASSWORD: datahub
      NEO4J_URI: bolt://neo4j
      NEO4J_USERNAME: neo4j
      PARTITIONS: "3"
      REPROCESS_DEFAULT_BROWSE_PATHS_V2: "false"
      SCHEMA_REGISTRY_SYSTEM_UPDATE: "true"
      SCHEMA_REGISTRY_TYPE: INTERNAL
      SPRING_KAFKA_PROPERTIES_AUTO_REGISTER_SCHEMAS: "true"
      SPRING_KAFKA_PROPERTIES_USE_LATEST_VERSION: "true"
      USE_CONFLUENT_SCHEMA_REGISTRY: "false"

  datahub-gms:
    image: acryldata/datahub-gms:v1.4.0.3
    container_name: spark-openlineage-datahub-gms
    depends_on:
      system-update-quickstart:
        condition: service_completed_successfully
    environment:
      ALTERNATE_MCP_VALIDATION: "true"
      DATAHUB_BASE_PATH: /
      DATAHUB_GMS_BASE_PATH: /
      DATAHUB_OPENLINEAGE_CAPTURE_COLUMN_LEVEL_LINEAGE: "true"
      DATAHUB_OPENLINEAGE_ENV: DEV
      DATAHUB_OPENLINEAGE_ORCHESTRATOR: spark
      DATAHUB_SERVER_TYPE: quickstart
      DATAHUB_TELEMETRY_ENABLED: "false"
      DATAHUB_UPGRADE_HISTORY_KAFKA_CONSUMER_GROUP_ID: spark-openlineage-demo-datahub-gms
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      EBEAN_DATASOURCE_HOST: mysql:3306
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_URL: jdbc:mysql://mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8&enabledTLSProtocols=TLSv1.2
      EBEAN_DATASOURCE_USERNAME: root
      ELASTICSEARCH_HOST: search
      ELASTICSEARCH_IMPLEMENTATION: opensearch
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ELASTICSEARCH_LIMIT_RESULTS_STRICT: "true"
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_PROTOCOL: http
      ELASTICSEARCH_USE_SSL: "false"
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      ENTITY_SERVICE_ENABLE_RETENTION: "true"
      ENTITY_VERSIONING_ENABLED: "true"
      ES_BULK_REFRESH_POLICY: WAIT_UNTIL
      GRAPH_SERVICE_DIFF_MODE_ENABLED: "true"
      GRAPH_SERVICE_IMPL: elasticsearch
      JAVA_OPTS: -Xms1g -Xmx1g
      KAFKA_BOOTSTRAP_SERVER: broker:29092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-gms:8080/schema-registry/api/
      MAE_CONSUMER_ENABLED: "true"
      MCE_CONSUMER_ENABLED: "true"
      METADATA_SERVICE_AUTH_ENABLED: "false"
      NEO4J_HOST: http://neo4j:7474
      NEO4J_PASSWORD: datahub
      NEO4J_URI: bolt://neo4j
      NEO4J_USERNAME: neo4j
      PE_CONSUMER_ENABLED: "true"
      POLICY_CACHE_REFRESH_INTERVAL_SECONDS: "120"
      SCHEMA_REGISTRY_TYPE: INTERNAL
      SEARCH_BAR_API_VARIANT: SEARCH_ACROSS_ENTITIES
      SHOW_HAS_SIBLINGS_FILTER: "true"
      SHOW_HOME_PAGE_REDESIGN: "true"
      SHOW_INGESTION_PAGE_REDESIGN: "true"
      SHOW_SEARCH_BAR_AUTOCOMPLETE_REDESIGN: "true"
      STRICT_URN_VALIDATION_ENABLED: "true"
      THEME_V2_DEFAULT: "true"
      UI_INGESTION_ENABLED: "true"
      UI_INGESTION_DEFAULT_CLI_VERSION: 1.1.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --fail http://datahub-gms:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 90s
    ports:
      - "8088:8080"

  datahub-frontend-react:
    image: acryldata/datahub-frontend-react:v1.4.0.3
    container_name: spark-openlineage-datahub-frontend
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_APP_VERSION: v1.4.0.3
      DATAHUB_BASE_PATH: /
      DATAHUB_GMS_BASE_PATH: /
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: 10MB
      DATAHUB_SECRET: YouKnowNothing
      DATAHUB_TRACKING_TOPIC: DataHubUsageEvent_v1
      ELASTIC_CLIENT_HOST: search
      ELASTIC_CLIENT_PORT: "9200"
      JAVA_OPTS: -Xms512m -Xmx512m -Dhttp.port=9002 -Dconfig.file=datahub-frontend/conf/application.conf -Djava.security.auth.login.config=datahub-frontend/conf/jaas.conf -Dlogback.configurationFile=datahub-frontend/conf/logback.xml -Dlogback.debug=false -Dpidfile.path=/dev/null
      KAFKA_BOOTSTRAP_SERVER: broker:29092
      PLAY_HTTP_CONTEXT: /
      THEME_V2_DEFAULT: "true"
    ports:
      - "9002:9002"

  spark:
    image: apache/spark:3.5.8-scala2.12-java17-python3-r-ubuntu
    container_name: spark-openlineage-spark
    depends_on:
      postgres-source:
        condition: service_healthy
      minio:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      HOME: /tmp/spark-home
      SPARK_LOCAL_DIRS: /tmp/spark-local
    volumes:
      - ./:/workspace
    working_dir: /workspace

volumes:
  datahub-broker-data:
  datahub-mysql-data:
  datahub-search-data:
